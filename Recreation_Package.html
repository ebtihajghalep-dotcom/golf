<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enjoy a luxurious golf experience at the Hole In One Resort in Portugal. Book now to take advantage of the best stadiums, luxurious accommodation, and distinctive restaurants.">
    <meta name="keywords" content="Golf resort, golf course reservations, luxury resort, golf in Portugal, golf accommodation, golf club">
    <meta name="robots" content="index, follow">
    <meta name="mobile-friendly" content="true">

    <title> Recreation Package </title>
    <link rel="stylesheet" href="./assets/css/Packages.css">
    
    
    <!--prelood image -->
    <link rel="--preload" as="image" href="./assets/images/rec_packag.png">
    <link rel="--preload" as="image" href="./assets/images/Recreation_card1.jpg">
    <link rel="--preload" as="image" href="./assets/images/Recreation_card2.jpg">
    <link rel="--preload" as="image" href="./assets/images/Recreation_card3 .jpg">
    <link rel="--preload" as="image" href="./assets/images/Recreation_card4.jpg">


</head>
<body>

    <div class="image-container">
        <img src="./assets/images/rec_packag.png" id="image" alt="Quintet_Package image" height="350" width="350" >
    </div>

    <div class="container">
        <div class="card visible">
            <div class="card-content">
                <div class="card-text">One night stay with full breakfast</div>
                <img src="./assets/images/Recreation_card1.jpg" alt="image for One night stay with full breakfast" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Access to the courts (fees apply and excludes the Sea View Court)</div>
                <img src="./assets/images/Recreation_card2.jpg" alt="image for Dinner at any of the resort's restaurants" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Complimentary club rental </div>
                <img src="./assets/images/Recreation_card3 .jpg " alt="image for Access to the courts (fees apply and excludes the Sea View Court)" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Dinner at any of the resort's restaurants </div>
                <img src="./assets/images/Recreation_card4.jpg" alt="image for Complimentary club rental" class="card-image4">
            </div>
        </div>
    </div>
    <script src="./assets/js/Packages.js"></script>

</body>
</html>
