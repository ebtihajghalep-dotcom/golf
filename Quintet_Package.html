<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enjoy a luxurious golf experience at the Hole In One Resort in Portugal. Book now to take advantage of the best stadiums, luxurious accommodation, and distinctive restaurants.">
    <meta name="keywords" content="Golf resort, golf course reservations, luxury resort, golf in Portugal, golf accommodation, golf club">
    <meta name="robots" content="index, follow">
    <meta name="mobile-friendly" content="true">

    <title> Quintet Package </title>
    <link rel="stylesheet" href="./assets/css/Packages.css">


    <!--prelood image -->
    <link rel="--preload" as="image" href="./assets/images/qui_package.png">
    <link rel="--preload" as="image" href="./assets/images/Quintet_card1.png">
    <link rel="--preload" as="image" href="./assets/images/Quintet_card2.jpg">
    <link rel="--preload" as="image" href="./assets/images/Quintet_card3.png">
    <link rel="--preload" as="image" href="./assets/images/Quintet_card4.png">


</head>
<body>

    <div class="image-container">
        <img src="./assets/images/qui_package.png" id="image" alt="Quintet-package image" height="350" width="350" >
    </div>

    <div class="container">
        <div class="card visible">
            <div class="card-content">
                <div class="card-text">Five nights full board accommodation in a luxury suite</div>
                <img src="./assets/images/Quintet_card1.png" alt="image for Five nights full board accommodation in a luxury suite" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Five rounds - 18 holes</div>
                <img src="./assets/images/Quintet_card2.jpg" alt="image for Five rounds - 18 holes" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">One guaranteed round on the famous Sea View course</div>
                <img src="./assets/images/Quintet_card3.png " alt="image for One guaranteed round on the famous Sea View course" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Complimentary digital coaching session</div>
                <img src="./assets/images/Quintet_card4.png" alt="image for Complimentary digital coaching session" class="card-image4">
            </div>
        </div>
    </div>
    
    <script src="./assets/js/Packages.js"></script>

</body>
</html>
