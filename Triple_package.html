<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Triple package </title>
    <link rel="stylesheet" href="./assets/css/Packages.css">

    <!--prelood image -->
    <link rel="--preload" as="image" href="./assets/images/tri_package.png">
    <link rel="--preload" as="image" href="./assets/images/Triple _card1.jpg">
    <link rel="--preload" as="image" href="./assets/images/Triple _card2 .jpg">
    <link rel="--preload" as="image" href="./assets/images/Triple _card3.png">
    <link rel="--preload" as="image" href="./assets/images/Triple _card4 .png">


</head>
<body>

    <div class="image-container">
        <img src="./assets/images/tri_package.png" id="image" alt="Triple package image" height="350" width="350" >
    </div>

    <div class="container">
        <div class="card visible">
            <div class="card-content">
                <div class="card-text">Two nights accommodation in a double room with breakfast
                </div>
                <img src="./assets/images/Triple _card1.jpg" alt="image for Two nights accommodation in a double room with breakfast" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Three rounds - 18 holes, including one round on the famous Seaview Course (if available)</div>
                <img src="./assets/images/Triple _card2 .jpg" alt=" image for Three rounds - 18 holes, including one round on the famous Seaview Course (if available)" class="card-image">
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <div class="card-text">Free car rental</div>
                <img src="./assets/images/Triple _card3.png" alt="image for Free car rental"class="card-image">
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <div class="card-text">20% discount for the professional store.</div>
                <img src="./assets/images/Triple _card4 .png" alt="image for 20% discount for the professional store."class="card-image">
            </div>
        </div>

    </div>
    <script src="./assets/js/Packages.js"></script>

</body>
</html>
